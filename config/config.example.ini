; ==========================================
; SATPI CONFIGURATION
; ==========================================

[station]
name = satpi									; Station name (arbitrary identifier)
timezone = Europe/Zurich							; IANA timezone (e.g., Europe/Zurich, Europe/London, UTC)

[qth]
latitude = 47.5									; Latitude in degrees (-90 to +90, south to north)
longitude = 8.9									; Longitude in degrees (-180 to +180, west to east)
altitude_m = 450								; Altitude above sea level in meters

[paths]
base_dir = /home/pi/satpi							; Base directory for relative paths (absolute path required)
output_dir = results/passes                                                     ; Directory for all pass related outputs
pass_file = results/passes/passes.json						; JSON file with predicted satellite passes (relative to base_dir)
reports_dir = results/reports							; Directory for reports and spectrum plots (relative to base_dir)
log_dir = logs									; Directory for log files (relative to base_dir)
lib_dir = lib									; Directory for lib functions (relative to base_dir)
tle_file = results/tle/weather.tle						; TLE (Two-Line Element) orbital data file (relative to base_dir)
reception_db_file = results/database/reception.db				; SQLite database for reception records (relative to base_dir)
satdump_bin = /usr/bin/satdump							; Path to SatDump binary executable (absolute path)
mail_bin = /usr/bin/msmtp							; Path to msmtp binary for email notifications (absolute path)
python_bin = /usr/bin/python3							; Path to Python 3 interpreter (absolute path)

[hardware]
source_id = 00000001								; RTL-SDR device ID or serial number
gain = 38.6									; RTL-SDR tuner gain in dB (typical: 38.6 for V4 dongles)
sample_rate = 2.4e6								; Sample rate in Hz (2.4e6 = 2.4 MHz, standard for RTL-SDR)
bias_t = false									; Enable bias-T power supply? (true/false) — for active LNAs

[satellite.METEOR-M2 3]
enabled = true									; Enable reception of this satellite? (true/false)
norad_id = 40014								; NORAD catalog number for orbital tracking
min_elevation_deg = 30								; Minimum elevation angle for reception in degrees (10-45 typical)
frequency = 137.9 MHz								; Reception frequency with unit (MHz, kHz, Hz, GHz)
bandwidth = 1 MHz								; Signal bandwidth with unit
pipeline = meteor_m2-x_lrpt							; SatDump processing pipeline for this satellite
pass_direction = all								; Pass direction filter (all, north_to_south, south_to_north, etc.)

[satellite.METEOR-M2 4]
enabled = true									; Enable reception of this satellite? (true/false)
norad_id = 40015								; NORAD catalog number for orbital tracking
min_elevation_deg = 30								; Minimum elevation angle for reception in degrees
frequency = 137.9 MHz								; Reception frequency with unit
bandwidth = 1 MHz								; Signal bandwidth with unit
pipeline = meteor_m2-x_lrpt							; SatDump processing pipeline for this satellite
pass_direction = all								; Pass direction filter

[scheduling]
pass_update_frequency = DAILY							; Update frequency (HOURLY, DAILY, WEEKLY)
pass_update_time = 00:00							; Update time in HH:MM format
pass_update_weekday = MONDAY							; Update weekday (MONDAY to SUNDAY, only for WEEKLY)
pre_start_seconds = 120								; Time buffer before pass start in seconds
post_stop_seconds = 120								; Time buffer after pass end in seconds
pass_max_prediction_hours = 168							; Maximum prediction lookahead in hours (168 = 7 days)

[network]
tle_url = https://api.n2yo.com/rest/v1/satellite/tle/25544/			; TLE data source URL (N2YO or Celestrak)
tle_format = JSON								; TLE format (JSON for N2YO, TLE for Celestrak)
tle_timeout_seconds = 30							; TLE download timeout in seconds
api_key = DEMO-API-KEY-123456							; API key for N2YO or service authentication

[decode]
min_cadu_size_bytes = 1048576							; Minimum file size for successful reception in bytes
success_dir_relpath = MSU-MR							; Subdirectory name for successfully decoded channels (relative to capture dir)

[copytarget]
enabled = true									; Enable copying received files to remote storage? (true/false)
type = rclone									; Copy tool type (rclone, sftp, etc.)
rclone_remote = dropbox								; rclone remote name (from 'rclone config')
rclone_path = satpi								; Path on remote storage
create_link = true								; Generate public sharing link? (true/false)

[notify]
enabled = true									; Send email notifications after successful reception? (true/false)
mail_to = user@example.com							; Email address for notifications
mail_subject_prefix = SATPI							; Prefix for email subject lines

[systemd]
service_user = pi								; Linux user account running satpi systemd services

[reception_setup]
antenna_type = Diamond DPKE-137 QFH						; Antenna type/model
antenna_location = garden corner 2m mast					; Physical location and mounting of antenna
antenna_orientation = vertical							; Antenna polarization (vertical, horizontal, etc.)
lna = n/a									; Low-Noise Amplifier (model or n/a if none)
rf_filter = n/a									; RF filter (model or n/a if none)
feedline = 3m									; Coaxial cable length and type
sdr = RTL-SDR V4								; SDR dongle model
raspberry_pi = Raspberry Pi 5							; Raspberry Pi model
power_supply = 5V/3A USB-C							; Power supply (voltage and amperage)
additional_info = RTL-SDR and RPi in separate housings				; Additional setup documentation

[optimize_reception]
enabled = true									; Enable automatic antenna orientation optimization? (true/false)
max_delta_aos_azimuth = 20.0							; Maximum azimuth deviation at rise (AOS) in degrees
max_delta_los_azimuth = 20.0							; Maximum azimuth deviation at set (LOS) in degrees
max_delta_culmination_azimuth = 20.0						; Maximum azimuth deviation at peak in degrees
max_delta_culmination_elevation = 10.0						; Maximum elevation deviation at peak in degrees
elevation_band_1_max = 20							; Elevation band 1 upper limit in degrees
elevation_band_2_max = 35							; Elevation band 2 upper limit in degrees
elevation_band_3_max = 50							; Elevation band 3 upper limit in degrees
elevation_band_4_max = 65							; Elevation band 4 upper limit in degrees
elevation_band_5_max = 80							; Elevation band 5 upper limit in degrees

[noise_floor]
measurement_duration = 600							; Measurement duration per run in seconds
schedule_minute = 30								; Minute of hour for measurement (e.g., 30 = every hour at XX:30)
center_freq = 137.9 MHz								; Center frequency with unit (MHz, kHz, Hz, GHz)
bandwidth = 0.4 MHz								; Measurement bandwidth with unit
bin_size = 10 kHz								; Spectrum bin size with unit
upload_enabled = true								; Upload measurement results to remote storage? (true/false)
rclone_remote = dropbox								; rclone remote for upload
create_link = false								; Generate public sharing link for measurements? (true/false)
