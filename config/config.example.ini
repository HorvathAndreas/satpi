; ==========================================
; SATPI CONFIGURATION EXAMPLE
; ==========================================
; Generic example configuration for satpi.
; Replace the example values with your local setup.

[station]
name = satpi                          ; station name used in logs and reports
timezone = Europe/Zurich              ; local timezone, e.g. Europe/Zurich

[qth]
latitude = 47.0000                    ; station latitude in decimal degrees
longitude = 8.0000                    ; station longitude in decimal degrees
altitude_m = 400                      ; station altitude above sea level in meters

[paths]
base_dir = /home/[YOUR USER NAME]/satpi       ; absolute satpi project root

pass_file = results/passes/passes.json ; predicted passes JSON, relative to base_dir
log_dir = logs                         ; log directory, relative to base_dir
output_dir = results/captures          ; capture output directory, relative to base_dir
generated_units_dir = systemd/generated ; generated systemd unit directory, relative to base_dir

tle_file = results/tle/weather.tle     ; local filtered TLE file, relative to base_dir
optimization_dir = results/optimization ; optimizer output directory, relative to base_dir
optimization_ai_report_file = results/optimization/optimization-report-ai.txt ; AI optimizer report file, relative to base_dir
reception_db_file = results/database/reception.db ; SQLite reception database, relative to base_dir

satdump_bin = /usr/bin/satdump         ; absolute path to SatDump binary
mail_bin = /usr/bin/msmtp              ; absolute path to mail sender binary
python_bin = /usr/bin/python3          ; absolute path to Python interpreter

[hardware]
source_id = 00000001                  ; RTL-SDR source id used by SatDump
gain = 42.1                           ; tuner gain in dB
sample_rate = 2.4e6                   ; sample rate in Hz
bias_t = false                        ; true if Bias-T should be enabled for LNA power

[satellite.METEOR-M2 3]
enabled = true                        ; enable or disable this satellite
min_elevation_deg = 20                ; minimum pass elevation to schedule
frequency_hz = 137900000              ; downlink frequency in Hz
bandwidth_hz = 150000                 ; RF bandwidth in Hz
pipeline = meteor_m2-x_lrpt           ; SatDump pipeline name
pass_direction = all                  ; allowed: all, north_to_south, south_to_north, west_to_east, east_to_west, southwest_to_northeast, southeast_to_northwest, northwest_to_southeast, northeast_to_southwest

[satellite.METEOR-M2 4]
enabled = true
min_elevation_deg = 20
frequency_hz = 137900000
bandwidth_hz = 150000
pipeline = meteor_m2-x_lrpt
pass_direction = all                  ; allowed: all, north_to_south, south_to_north, west_to_east, east_to_west, southwest_to_northeast, southeast_to_northwest, northwest_to_southeast, northeast_to_southwest

[scheduling]
pass_update_frequency = DAILY         ; DAILY or WEEKLY
pass_update_time = 00:00              ; local time in HH:MM
pass_update_weekday = MONDAY          ; used only if frequency = WEEKLY
pre_start_seconds = 120               ; start reception before AOS
post_stop_seconds = 120               ; stop reception after LOS
max_pass_age_hours = 24               ; maximum age of generated pass predictions

[network]
tle_url = https://celestrak.org/NORAD/elements/gp.php?GROUP=weather&FORMAT=tle ; source URL for TLE download
tle_timeout_seconds = 30              ; network timeout in seconds

[decode]
min_cadu_size_bytes = 1048576         ; minimum CADU size required before decode starts
success_dir_relpath = MSU-MR          ; decode considered successful if this relative directory exists

[copytarget]
enabled = true                        ; enable post-pass copy/upload
type = rclone                         ; currently supported/used: rclone
rclone_remote = dropbox               ; rclone remote name
rclone_path = satpi                   ; destination path on the remote
create_link = true                    ; create a share link after successful upload if supported

[notify]
enabled = true                        ; send notification mail after successful upload
mail_to = your.name@example.com       ; notification recipient
mail_subject_prefix = SATPI           ; subject prefix for notification mails

[systemd]
service_user = [YOUR USER NAME]       ; user for generated systemd services

[reception_setup]
antenna_type = Antenna Model          ; antenna type/model
antenna_location = antenna location   ; physical antenna location
antenna_orientation = vertical        ; antenna orientation or mounting description
lna = n/a                             ; LNA description or n/a
rf_filter = n/a                       ; RF filter description or n/a
feedline = 3m                         ; feedline/cable description
sdr = RTL-SDR V4                      ; SDR model
raspberry_pi = Raspberry Pi 5         ; host platform
power_supply = PSU description        ; power supply description
additional_info = n/a                 ; optional free-text notes

[optimize_reception]
enabled = true                           ; enable or disable similar-pass grouping and setup comparison report generation

max_delta_aos_azimuth = 20.0             ; maximum allowed difference in AOS azimuth [deg] for two passes to be grouped
max_delta_los_azimuth = 20.0             ; maximum allowed difference in LOS azimuth [deg] for two passes to be grouped
max_delta_culmination_azimuth = 20.0     ; maximum allowed difference in culmination azimuth [deg] for two passes to be grouped
max_delta_culmination_elevation = 10.0   ; maximum allowed difference in culmination elevation [deg] for two passes to be grouped

elevation_band_1_max = 20                ; upper limit of band 1: below this is "very low elevation"
elevation_band_2_max = 35                ; upper limit of band 2: 20-35 deg becomes "low elevation"
elevation_band_3_max = 50                ; upper limit of band 3: 35-50 deg becomes "lower medium elevation"
elevation_band_4_max = 65                ; upper limit of band 4: 50-65 deg becomes "upper medium elevation"
elevation_band_5_max = 80                ; upper limit of band 5: 65-80 deg becomes "high elevation", above this is "very high elevation"

output_dir = /home/andreas/satpi/results/reports   ; directory where JSON report, PDF report and generated group skyplots are written

[optimize_reception_ai]
enabled = true                        ; enable AI-assisted optimizer analysis
max_passes = 25                       ; maximum number of passes included in the AI prompt
model = gpt-5                         ; model name used by the AI analysis step
include_optimizer_report = true       ; include classic optimizer report in AI prompt
temperature = 1.0                     ; model temperature
api_key =                             ; API key for OpenAI

[iq_baseband_capture]
enabled = false                       ; enable or disable IQ/baseband capture
format = cs16                         ; cu8, cs8, cs16, cf32
sample_rate = 2400000                 ; sample rate for IQ/baseband recording
keep_last_files = 10                  ; keep only the newest N IQ/baseband files locally

[noise_floor]
; Duration of each noise floor measurement in seconds (default: 600 = 10 min)
measurement_duration = 600
; Minute past the hour when the systemd timer runs (0-59, default: 0 = top of hour)
; Change this if it conflicts with scheduled satellite passes
schedule_minute = 0

; Centre frequency and bandwidth of the monitored signal
; The measurement covers center_freq_mhz +/- bandwidth_mhz/2
center_freq_mhz = 137.9          ; centre frequency in MHz
bandwidth_mhz = 0.4              ; total bandwidth to monitor in MHz
bin_size_khz = 10.0              ; FFT bin size in kHz

; Optional: explicit start/end override center+bandwidth if set
; freq_start_mhz = 137.7
; freq_end_mhz   = 138.1

; Upload noise floor analysis results to cloud storage after each run
upload_enabled = true
rclone_remote = dropbox           ; rclone remote name
rclone_path = satpi/noise_floor_reports ; destination path on the remote
create_link = false
